<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Developer Profile</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            color: #333;
            text-align: center;
            margin: 20px;
        }

        #header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        #header img {
            width: 100px;
            margin-right: 10px;
        }

        h1 {
            color: #007bff;
        }

        img {
            vertical-align: middle;
        }

        hr {
            margin: 30px 0;
        }

        #skills img {
            margin: 5px;
        }

        #stats {
            margin-top: 30px;
        }

        #stats img {
            max-width: 100%;
            height: auto;
            width: 400px ;
            height: 200px;
        }
    </style>
</head>
<body>

<div id="header">
    <img src="https://komarev.com/ghpvc/?serangelicloud&style=flat-square&color=blue" alt=""/>
</div>

<h1>
    hey there
    <img src="https://media.giphy.com/media/hvRJCLFzcasrR4ia7z/giphy.gif" width="30px"/>
</h1>

<p>im a young developer who really loves coding, so why don't you code with me?</p>

<hr>

<div id="skills">
    <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/css3/css3-plain-wordmark.svg" title="CSS3" alt="CSS" width="40" height="40"/>
    <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/html5/html5-original.svg" title="HTML5" alt="HTML" width="40" height="40"/>

    <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/git/git-original-wordmark.svg" title="Git" alt="Git" width="40" height="40"/>
</div>

<hr>

<div id="stats">
    <img src="http://github-readme-streak-stats.herokuapp.com?user=serangelicloud&theme=dark&background=000000" alt="GitHub Streak" width="300" height="200"/>
    <img src="https://github-readme-stats.vercel.app/api/top-langs/?username=serangelicloud&layout=compact&theme=vision-friendly-dark" alt="Top Languages" width="300" height="200"/>
